<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prato Consciente</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  margin:0;
  background:linear-gradient(135deg,#1b5e20,#2e7d32,#388e3c);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.quiz-bg{
  position:fixed;
  width:100%;
  height:100%;
  opacity:0.08;
  font-size:40px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
}

.quiz-bg span{margin:20px;}

.container{
  position:relative;
  z-index:1;
  background:white;
  width:95%;
  max-width:700px;
  border-radius:25px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

h1,h2,h3{text-align:center;}

.school{
  text-align:center;
  color:#1b5e20;
  font-weight:600;
}

.impact{
  background:#e8f5e9;
  padding:15px;
  border-radius:15px;
  margin:20px 0;
  text-align:center;
  font-weight:600;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.primary{
  background:linear-gradient(135deg,#2e7d32,#1b5e20);
  color:white;
}

.secondary{
  background:linear-gradient(135deg,#c8e6c9,#81c784);
}

.option{
  background:rgba(165,214,167,0.4);
  margin:10px 0;
  border:1px solid rgba(46,125,50,0.3);
}

.option:hover{
  background:rgba(129,199,132,0.6);
}

.hidden{display:none;}

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin-bottom:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#2e7d32;
}

.result{
  background:rgba(200,230,201,0.6);
  padding:20px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="quiz-bg">
<span>🍎</span><span>🥦</span><span>🍌</span><span>🥕</span>
<span>🍉</span><span>🥬</span><span>🍍</span><span>🍇</span>
<span>🍓</span><span>🥑</span><span>🌽</span><span>🍊</span>
</div>

<div class="container">

<div id="inicio">
<div class="school">Colégio Estadual Professor Lysímaco Ferreira da Costa</div>

<h1>🌱 Prato Consciente</h1>

<div class="impact" id="fraseInicio"></div>

<button class="primary" onclick="startQuiz()">Fazer o Quiz</button>
<button class="secondary" onclick="toggleInfo()">Por que isso importa?</button>

<div id="info" class="hidden impact">
<p>🗑️ 40 mil toneladas de alimentos são desperdiçados por dia no Brasil.</p>
<p>🍽️ 925 milhões de pessoas passam fome no mundo.</p>
<p>💦 Desperdiçar comida, é desperdiçar dinheiro, água e recursos.</p>
  
</div>
</div>

<div id="quiz" class="hidden">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<h2 id="pergunta"></h2>
<div id="opcoes"></div>
</div>

<div id="resultado" class="hidden result">
<h2 id="titulo"></h2>
<p id="pontuacao"></p>
<p id="texto"></p>

<div class="impact" id="fraseFinal"></div>

<h3>Dicas:</h3>
<p id="dicas"></p>

<h3>Desafio:</h3>
<p id="desafio"></p>

<p id="motivacao"></p>

<button class="primary" onclick="restart()">Refazer quiz</button>
<button class="secondary" onclick="voltar()">Voltar ao início</button>

<button onclick="compartilhar()">📱 Compartilhar</button>
<canvas id="qrcode"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
function toggleInfo(){
document.getElementById("info").classList.toggle("hidden");
}

/* FRASES VARIADAS */
const frasesInicio=[
"Você come tudo o que pega ou desperdiça sem perceber?",
"Cada prato conta. O seu faz a diferença!",
"Pequenas atitudes mudam o mundo 💚",
"Você já pensou no impacto do seu prato?"
];

const frasesFinal=[
"Você pode fazer a diferença todos os dias!",
"Pequenas escolhas mudam o planeta 🌍",
"Seu prato pode salvar recursos!",
"A mudança começa no seu prato e na sua mente",
  "Pequenos gestos fazem toda a diferença: desperdício zero é o alvo"
];

const desafios=[
"Hoje, não deixe nada sobrando no seu prato.",
"Pegue menos comida e evite o desperdício.",
"Reaproveite restos de alimentos que você não comeu no dia anterior.",
"Não jogue comida fora hoje, evite o desperdício.",
"Conscientizar alguém sobre o impacto ambiental do desperdício.",
  "Armazenar corretamente os alimentos para evitar o desperdício."
];

const motivacoes=[
"🌱 Continue evoluindo!",
"💚 Você já começou a mudança!",
"🌍 O planeta agradece!",
"✨ Pequenas atitudes importam!"
];

document.getElementById("fraseInicio").innerText=
frasesInicio[Math.floor(Math.random()*frasesInicio.length)];

const perguntas=[
{p:"Você planeja suas compras antes de ir ao mercado?",op:["Sim, faço uma lista antes.","Às vezes, só planejo quando lembro.","Não, apenas pego o que vejo pela frente."],pts:[2,1,0]},
{p:"O que você costuma fazer com as sobras de refeições anteriores?",op:["Consumo todas as sobras como nova refeição.","Reaproveito algumas, mas outras vão para o lixo.","Jogo fora e prefiro fazer comida fresca sempre."],pts:[2,1,0]},
{p:"Ao comer fora ou colocar comida no prato, como você define a quantidade?",op:["Coloco pouca comida e repito apenas se necessário.","Coloco uma quantidade moderada, mas sobra um pouco.","Encho o prato e frequentemente sobra bastante."],pts:[2,1,0]},
{p:"Com que frequência você joga comida fora porque estragou na geladeira ou despensa?",op:["Raramente ou nunca.","Às vezes (algumas vezes por mês).","Frequentemente (toda semana)."],pts:[2,1,0]},
{p:"Você costuma verificar a data de validade dos produtos antes de comprar?",op:["Sim, sempre verifico para pegar o mais fresco.","Às vezes olho.","Não, pego o primeiro que vejo."],pts:[2,1,0]}
];

let atual=0;
let score=0;

function startQuiz(){
trocarTela("inicio","quiz");
mostrarPergunta();
}

function mostrarPergunta(){
let q=perguntas[atual];
pergunta.innerText=q.p;

let html="";
q.op.forEach((o,i)=>{
html+=`<button class="option" onclick="responder(${q.pts[i]})">${o}</button>`;
});
opcoes.innerHTML=html;

bar.style.width=((atual/perguntas.length)*100)+"%";
}

function responder(p){
score+=p;
atual++;

if(atual<perguntas.length){
mostrarPergunta();
}else{
mostrarResultado();
}
}

function mostrarResultado(){
registrarQuiz();
trocarTela("quiz","resultado");

pontuacao.innerText="Pontuação: "+score;

fraseFinal.innerText=
frasesFinal[Math.floor(Math.random()*frasesFinal.length)];

desafio.innerText=
desafios[Math.floor(Math.random()*desafios.length)];

motivacao.innerText=
motivacoes[Math.floor(Math.random()*motivacoes.length)];

if(score>=8){
titulo.innerText="🌟 Muito consciente!";
texto.innerText="Você tem ótimos hábitos!";
dicas.innerText="Continue assim e influencie outras pessoas.";
}
else if(score>=4){
titulo.innerText="💡 Em evolução";
texto.innerText="Você pode melhorar.";
dicas.innerText="Planeje melhor e evite excessos.";
}
else{
titulo.innerText="🌱 Hora de mudar";
texto.innerText="Seus hábitos precisam melhorar.";
dicas.innerText="Evite o desperdício no prato.";
}
}

function trocarTela(sair,entrar){
document.getElementById(sair).classList.add("hidden");
document.getElementById(entrar).classList.remove("hidden");
}

function restart(){
score=0;
atual=0;
trocarTela("resultado","quiz");
mostrarPergunta();
}

function voltar(){
score=0;
atual=0;
trocarTela("resultado","inicio");
}

function compartilhar(){
const link=" https://pratoconsciente.github.io/prato-consciente/";
QRCode.toCanvas(document.getElementById("qrcode"), link);
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBgoXXYthJuiDbo2EchLp4uYOV3g8xWI-c",
authDomain: "prato-consciente-a80bf.firebaseapp.com",
projectId: "prato-consciente-a80bf",
storageBucket: "prato-consciente-a80bf.firebasestorage.app",
messagingSenderId: "317212713518",
appId: "1:317212713518:web:268bb4b9d3decd933235bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// conta acesso ao abrir site
addDoc(collection(db,"acessos"),{
data:new Date()
});

// função chamada quando termina quiz
window.registrarQuiz = function(){

addDoc(collection(db,"quiz_finalizados"),{
data:new Date()
});

};

</script>


</body>
</html>
