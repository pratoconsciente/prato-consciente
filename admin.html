<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#1b5e20,#4caf50);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.numero{
font-size:50px;
font-weight:800;
margin:15px 0;
color:#b2ffb2;
}

</style>

</head>

<body>

<div class="box">

<h1>📊 Painel do Projeto</h1>

<h2>Acessos ao site</h2>

<div class="numero" id="acessos">...</div>

<h2>Pessoas que fizeram o quiz</h2>

<div class="numero" id="quiz">...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBgoXXYthJuiDbo2EchLp4uYOV3g8xWI-c",
authDomain: "prato-consciente-a80bf.firebaseapp.com",
projectId: "prato-consciente-a80bf",
storageBucket: "prato-consciente-a80bf.firebasestorage.app",
messagingSenderId: "317212713518",
appId: "1:317212713518:web:268bb4b9d3decd933235bf"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function carregar(){

const acessosSnap = await getDocs(collection(db,"acessos"));

document.getElementById("acessos").innerText = acessosSnap.size;

const quizSnap = await getDocs(collection(db,"quiz_finalizados"));

document.getElementById("quiz").innerText = quizSnap.size;

}

carregar();

</script>

</body>
</html>
